# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions
# More info on Python, GitHub Actions, and Azure App Service: https://aka.ms/python-webapps-actions

name: Build and deploy Python app to Azure Web App - aatreyainfo-feedback

on:
  push:
    branches:
      - main
    paths:
      - 'backend_sqlserver/**'
      - '.github/workflows/main_aatreyainfo-feedback.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python version
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: backend_sqlserver
        run: |
          pip install -r requirements.txt

      - name: Set App Service startup command
        uses: azure/appservice-settings@v1
        with:
          app-name: aatreyainfo-feedback
          app-settings-json: |
            [
              {"name": "CORS_ORIGINS", "value": "https://yellow-ocean-07bef8000.1.azurestaticapps.net,http://localhost:3000", "slotSetting": false},
              {"name": "SCM_DO_BUILD_DURING_DEPLOYMENT", "value": "false", "slotSetting": false}
            ]
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: aatreyainfo-feedback
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ./backend_sqlserver
          startup-command: "gunicorn server:app -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:8000 --workers 2"
          